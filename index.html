<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dayble 行事曆</title>
<meta name="description" content="Dayble — 簡潔可愛的中英雙語行事曆，支援週/日/月/議程檢視、分類、重複與提醒。">
<meta name="theme-color" content="#ff7aa8" id="meta-theme-color">
<meta name="msapplication-navbutton-color" content="#ff7aa8" id="meta-nav-color">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dayble">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@400;700&display=swap">
<script>
(function(){try{
  var d=JSON.parse(localStorage.getItem('dayble_v1')||'{}');
  var bg={pink:'#faf7fb',purple:'#f9f7ff',blue:'#f5f8ff',green:'#f4faf8',coral:'#fffaf9',
    wenjing:'#f8f4ee',beach:'#f0faff',forest:'#f2f6f2',animal:'#fff8f2',sakura:'#fff5f8',
    dark:'#1a1825',night:'#0d0d1a'};
  var ink={pink:'#3f3947',purple:'#3b2560',blue:'#1a2a45',green:'#1a3d2e',coral:'#42201a',
    wenjing:'#3a2812',beach:'#0e3d50',forest:'#1a3020',animal:'#3a1808',sakura:'#4a1828',
    dark:'#f0ecff',night:'#e0d8ff'};
  var k=d.themePreset&&bg[d.themePreset]?d.themePreset:'pink';
  var s=document.documentElement.style;
  s.setProperty('--bg',bg[k]); s.setProperty('--ink',ink[k]);
  s.background=bg[k]; document.documentElement.style.background=bg[k];
}catch(e){}}());
</script>
<script src="runtime.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
    * { box-sizing: border-box; }
    :root { --bg:#faf7fb; --ink:#3f3947; --primary:#ff7aa8; --line:#efe9f2; --panel:#ffffff; --sub:#8f8899; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Nunito','Noto Sans TC',sans-serif; -webkit-font-smoothing: antialiased; color: var(--ink); background: var(--bg); transition: background .25s, color .25s; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { filter: brightness(.85); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--sub); background-clip: padding-box; }
    input, textarea, select, button { font-family: inherit; }
    @keyframes popIn { from { opacity: 0; transform: scale(.96) translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-100%); } to { opacity: 1; transform: none; } }
    .todo-row:hover { background: color-mix(in srgb, var(--primary) 8%, var(--bg)); }
    .todo-row:hover button:last-child { opacity: 1 !important; }
</style>
</helmet>
<div id="app-root" style="height:100vh;width:100%;display:flex;overflow:hidden;background:#faf7fb;position:relative;transition:background .25s">
  {{ sidebar }}
  {{ backdrop }}
  <main style="flex:1;min-width:0;display:flex;flex-direction:column;min-height:0">
    {{ header }}
    <div style="flex:1;min-height:0;display:flex;flex-direction:column">
      {{ mainView }}
    </div>
  </main>
  {{ mobileNav }}
  {{ fab }}
  {{ modal }}
  {{ toast }}
  
</div>
</x-dc>
<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;primaryColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ff7aa8&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;外觀&quot;},&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;month&quot;,&quot;options&quot;:[&quot;week&quot;,&quot;day&quot;,&quot;month&quot;,&quot;agenda&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;外觀&quot;},&quot;weekStartMonday&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;行為&quot;}}">
class Component extends DCLogic {
  state = {
    view: this.props.defaultView ?? 'week',
    cursor: (()=>{ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); })(),
    selected: (()=>{ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); })(),
    query: '',
    sidebarOpen: false,
    isMobile: (typeof window !== 'undefined' ? window.innerWidth : 1200) < 900,
    hidden: {},
    modal: null,
    toast: null,
    categories: [
      { id: 'work',   name: '工作 Work',    dot: '#6f9bf0', soft: '#e7eeff', ink: '#3f63b0' },
      { id: 'life',   name: '生活 Life',    dot: '#ff8fbf', soft: '#ffe6f1', ink: '#c25689' },
      { id: 'health', name: '健康 Health',  dot: '#5fc79a', soft: '#e1f6ec', ink: '#2f8f66' },
      { id: 'study',  name: '學習 Study',   dot: '#f2b64f', soft: '#fdefd6', ink: '#b5811f' },
      { id: 'social', name: '社交 Social',  dot: '#a98bf0', soft: '#eee7ff', ink: '#7554c0' },
    ],
    events: [
    ],
    todos: [
    ],
    newTodo: '',
    themePreset: (()=>{ try{ const d=JSON.parse(localStorage.getItem('dayble_v1')||'{}'); return d.themePreset||'pink'; }catch(e){ return 'pink'; } })(),
  };

  HH = 52;
  get today(){ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); }
  holidays = {
    '2026-01-01':'元旦','2026-02-14':'情人節','2026-02-17':'春節','2026-04-04':'兒童節',
    '2026-04-05':'清明節','2026-05-01':'勞動節','2026-06-19':'端午節','2026-09-25':'中秋節',
    '2026-09-28':'教師節','2026-10-10':'國慶日','2026-12-25':'聖誕節',
  };
  weekdayNames = ['日','一','二','三','四','五','六'];

  get theme() {
    return this.THEMES[this.state?.themePreset ?? 'pink'] ?? this.THEMES.pink;
  }
  get weekStartMon() { return this.props.weekStartMonday ?? true; }

  _history = [];
  _redoStack = [];
  _notified = new Set();
  _notifDay = '';
  _notifPerm = (typeof Notification !== 'undefined') ? Notification.permission : 'denied';

  THEMES = {
    // ── 基本色系 ──────────────────────────────────────────────────
    pink:    { label:'粉紅',  primary:'#ff7aa8', primarySoft:'#ffe4ef', bg:'#faf7fb', panel:'#ffffff', ink:'#3f3947', sub:'#8f8899', line:'#efe9f2' },
    purple:  { label:'紫羅蘭',primary:'#a670e8', primarySoft:'#f0e8ff', bg:'#f9f7ff', panel:'#ffffff', ink:'#3b2560', sub:'#8a78b0', line:'#e8e0f8' },
    blue:    { label:'天藍',  primary:'#4a90d9', primarySoft:'#dceeff', bg:'#f5f8ff', panel:'#ffffff', ink:'#1a2a45', sub:'#5a7898', line:'#d8e8f8' },
    green:   { label:'薄荷',  primary:'#3db882', primarySoft:'#d5f5e8', bg:'#f4faf8', panel:'#ffffff', ink:'#1a3d2e', sub:'#5a8070', line:'#c8ead8' },
    coral:   { label:'珊瑚',  primary:'#f0705a', primarySoft:'#ffe8e4', bg:'#fffaf9', panel:'#ffffff', ink:'#42201a', sub:'#9a7068', line:'#f0ddd8' },
    // ── 自然風格 ──────────────────────────────────────────────────
    wenjing: { label:'文青',  primary:'#b8895a', primarySoft:'#f5e8d8', bg:'#f8f4ee', panel:'#fffdf8', ink:'#3a2812', sub:'#9a826a', line:'#e8ddd0',
                font:"'Noto Serif TC','Georgia',serif" },
    beach:   { label:'海邊',  primary:'#1aa8c8', primarySoft:'#cdf0f8', bg:'#f0faff', panel:'#ffffff', ink:'#0e3d50', sub:'#5090a8', line:'#b8e0f0' },
    forest:  { label:'山林',  primary:'#4a7c5a', primarySoft:'#d0e8d4', bg:'#f2f6f2', panel:'#ffffff', ink:'#1a3020', sub:'#6a8a70', line:'#c4dcc8' },
    animal:  { label:'動物',  primary:'#e07838', primarySoft:'#fde8d0', bg:'#fff8f2', panel:'#ffffff', ink:'#3a1808', sub:'#986040', line:'#f5d8b0',
                font:"'Fredoka',sans-serif" },
    sakura:  { label:'櫻花',  primary:'#d9688a', primarySoft:'#fce0e8', bg:'#fff5f8', panel:'#ffffff', ink:'#4a1828', sub:'#a06078', line:'#f5c8d8' },
    // ── 暗色系 ────────────────────────────────────────────────────
    dark:    { label:'深色',  primary:'#a78bfa', primarySoft:'#312e52', bg:'#1a1825', panel:'#24203a', ink:'#f0ecff', sub:'#8b85a8', line:'#3a3558' },
    night:   { label:'暗夜',  primary:'#6a5acd', primarySoft:'#20205a', bg:'#0d0d1a', panel:'#16162a', ink:'#e0d8ff', sub:'#9088c0', line:'#28284a' },
  };

  STORE_KEY = 'dayble_v1';

  componentDidMount() {
    // 讀取本機儲存的資料（同一台裝置重整不會消失）
    try {
      const raw = localStorage.getItem(this.STORE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        const patch = {};
        if (Array.isArray(d.events)) patch.events = d.events;
        if (Array.isArray(d.todos)) patch.todos = d.todos;
        if (d.hidden && typeof d.hidden === 'object') patch.hidden = d.hidden;
        if (d.themePreset && this.THEMES[d.themePreset]) patch.themePreset = d.themePreset;
        if (Object.keys(patch).length) this.setState(patch);
      }
    } catch (e) {}

    this._onResize = () => {
      const m = window.innerWidth < 900;
      if (m !== this.state.isMobile) this.setState({ isMobile: m, sidebarOpen: false });
    };
    window.addEventListener('resize', this._onResize);

    this._onKeydown = (e) => {
      const isInput = ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName);
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault(); this.undoLast();
      } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        e.preventDefault(); this.redoLast();
      } else if (!isInput && (e.ctrlKey || e.metaKey) && e.key === 'c' && this.state.modal) {
        this._clipEvent = { ...this.state.modal };
        this.flash('已複製：' + this._clipEvent.title);
      } else if (!isInput && (e.ctrlKey || e.metaKey) && e.key === 'v' && this._clipEvent) {
        e.preventDefault();
        const ds = this.state.selected;
        const pasted = { ...this._clipEvent, id: Date.now()+'', date: ds };
        this.pushUndo();
        this.setState(s => ({ events: [...s.events, pasted] }));
        this.flash('已貼上到 ' + (this.parse(ds).getMonth()+1) + '/' + this.parse(ds).getDate());
      }
    };
    document.addEventListener('keydown', this._onKeydown);

    this._notifInterval = setInterval(() => this._checkNotifications(), 60000);
    this._checkNotifications();
    this.applyThemeToDom(this.theme);

    // 跨分頁同步：同一瀏覽器另開分頁修改時，這裡即時更新
    this._onStorage = (e) => {
      if (e.key !== this.STORE_KEY || !e.newValue) return;
      try {
        const d = JSON.parse(e.newValue);
        this.setState({ events: d.events || this.state.events, todos: d.todos || this.state.todos, hidden: d.hidden || this.state.hidden });
      } catch (err) {}
    };
    window.addEventListener('storage', this._onStorage);
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
    window.removeEventListener('storage', this._onStorage);
    document.removeEventListener('keydown', this._onKeydown);
    clearInterval(this._notifInterval);
  }

  componentDidUpdate() {
    try {
      localStorage.setItem(this.STORE_KEY, JSON.stringify({ events: this.state.events, todos: this.state.todos, hidden: this.state.hidden, themePreset: this.state.themePreset }));
    } catch (e) {}
  }

  // ---------- date helpers ----------
  pad(n){ return String(n).padStart(2,'0'); }
  toStr(d){ return d.getFullYear()+'-'+this.pad(d.getMonth()+1)+'-'+this.pad(d.getDate()); }
  parse(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  addDays(s,n){ const d=this.parse(s); d.setDate(d.getDate()+n); return this.toStr(d); }
  dow(s){ return this.parse(s).getDay(); }
  toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
  toHHMM(min){ min=Math.max(0,Math.min(1439,Math.round(min))); return this.pad(Math.floor(min/60))+':'+this.pad(min%60); }
  catOf(id){ return this.state.categories.find(c=>c.id===id) || this.state.categories[0]; }

  startOfWeek(s){ const dw=this.dow(s); const off = this.weekStartMon ? (dw===0?6:dw-1) : dw; return this.addDays(s, -off); }
  weekDates(s){ const st=this.startOfWeek(s); return Array.from({length:7},(_,i)=>this.addDays(st,i)); }
  monthMatrix(s){
    const d=this.parse(s); const y=d.getFullYear(), m=d.getMonth();
    const first=this.toStr(new Date(y,m,1));
    const st=this.startOfWeek(first);
    return Array.from({length:6},(_,w)=>Array.from({length:7},(_,i)=>this.addDays(st,w*7+i)));
  }

  // ---------- recurrence expansion ----------
  occursOn(ev, dateStr){
    if (dateStr < ev.date) return false;
    if (ev.repeat==='none') return dateStr===ev.date;
    if (ev.repeat==='daily') return true;
    if (ev.repeat==='weekly') return this.dow(dateStr)===this.dow(ev.date);
    if (ev.repeat==='weekdays'){ const w=this.dow(dateStr); return w>=1 && w<=5; }
    if (ev.repeat==='monthly') return this.parse(dateStr).getDate()===this.parse(ev.date).getDate();
    return false;
  }
  instancesOn(dateStr){
    const q=this.state.query.trim().toLowerCase();
    return this.state.events
      .filter(ev=>!this.state.hidden[ev.cat])
      .filter(ev=>this.occursOn(ev,dateStr))
      .filter(ev=>!q || (ev.title+' '+(ev.note||'')).toLowerCase().includes(q))
      .map(ev=>({ ...ev, _date:dateStr }))
      .sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
  }

  // ---------- actions ----------
  setView(v){ this._scrolled=false; this.setState({ view:v, sidebarOpen:false }); }
  go(delta){
    const { view, cursor } = this.state;
    let c=cursor;
    if (view==='month'){ const d=this.parse(cursor); d.setMonth(d.getMonth()+delta); c=this.toStr(d); }
    else if (view==='week') c=this.addDays(cursor, 7*delta);
    else if (view==='day') c=this.addDays(cursor, delta);
    else c=this.addDays(cursor, 7*delta);
    this.setState({ cursor:c });
  }
  goToday(){ this._scrolled=false; this.setState({ cursor:this.today, selected:this.today }); }
  pickDate(s){ this.setState({ selected:s, cursor:s }); }

  openNew(dateStr, start){
    this.setState({ modal:{ id:null, title:'', date:dateStr||this.state.selected, start:start||'09:00', end:this.toHHMM(this.toMin(start||'09:00')+60), cat:'life', repeat:'none', reminder:10, note:'' } });
  }
  openEdit(ev){ this.setState({ modal:{ ...ev } }); }
  closeModal(){ this.setState({ modal:null }); }
  updModal(k,v){ this.setState(s=>({ modal:{ ...s.modal, [k]:v } })); }
  saveModal(){
    this.pushUndo();
    const m=this.state.modal;
    if (!m.title.trim()){ this.flash('請輸入標題'); return; }
    if (this.toMin(m.end)<=this.toMin(m.start)) m.end=this.toHHMM(this.toMin(m.start)+30);
    this.setState(s=>{
      let evs;
      if (m.id){ evs=s.events.map(e=>e.id===m.id?{...m}:e); }
      else { evs=[...s.events, { ...m, id:'e'+Date.now() }]; }
      return { events:evs, modal:null };
    });
    this.flash(m.id?'已更新事件 ✓':'已新增事件 ✓');
  }
  deleteModal(){
    this.pushUndo();
    const id=this.state.modal.id;
    this.setState(s=>({ events:s.events.filter(e=>e.id!==id), modal:null }));
    this.flash('已刪除事件');
  }
  flash(msg){ this.setState({ toast:msg }); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({ toast:null }), 1900); }

  applyThemeToDom(T){
    const r=document.documentElement.style;
    r.setProperty('--bg',     T.bg);
    r.setProperty('--ink',    T.ink);
    r.setProperty('--primary',T.primary);
    r.setProperty('--line',   T.line);
    r.setProperty('--panel',  T.panel);
    r.setProperty('--sub',    T.sub);
    document.body.style.background=T.bg;
    document.body.style.color=T.ink;
    // 直接設定 app 外層 div（CSS 變數無法跨 DCLogic 渲染層）
    const appRoot=document.getElementById('app-root');
    if(appRoot){ appRoot.style.background=T.bg; appRoot.style.color=T.ink; }
    const baseFont="'Nunito','Noto Sans TC',sans-serif";
    document.body.style.fontFamily=T.font||baseFont;
    if(appRoot) appRoot.style.fontFamily=T.font||baseFont;
    const mc=document.getElementById('meta-theme-color');
    const mn=document.getElementById('meta-nav-color');
    if(mc) mc.content=T.primary;
    if(mn) mn.content=T.primary;
    const ab=document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
    if(ab) ab.content=T.bg.startsWith('#1')||T.bg.startsWith('#2')?'black':'default';
  }

  pushUndo(){ this._history.push({ events:[...this.state.events], todos:[...this.state.todos] }); if(this._history.length>20) this._history.shift(); this._redoStack=[]; }
  undoLast(){ if(!this._history.length){ this.flash('沒有可以復原的操作'); return; } this._redoStack.push({ events:[...this.state.events], todos:[...this.state.todos] }); const p=this._history.pop(); this.setState({ events:p.events, todos:p.todos }); this.flash('已復原 ↩'); }
  redoLast(){ if(!this._redoStack.length){ this.flash('沒有可以重做的操作'); return; } this._history.push({ events:[...this.state.events], todos:[...this.state.todos] }); const p=this._redoStack.pop(); this.setState({ events:p.events, todos:p.todos }); this.flash('已重做 ↪'); }

  requestNotifPerm(){ if(!('Notification' in window)) return; Notification.requestPermission().then(p=>{ this._notifPerm=p; if(p==='granted') this.flash('提醒通知已開啟 🔔'); }); }
  _checkNotifications(){
    if(this._notifPerm!=='granted') return;
    const now=new Date(); const todayStr=this.toStr(now);
    if(this._notifDay!==todayStr){ this._notified.clear(); this._notifDay=todayStr; }
    const nowMin=now.getHours()*60+now.getMinutes();
    this.state.events.forEach(ev=>{
      if(ev.reminder<=0 || !this.occursOn(ev,todayStr)) return;
      const fireMin=this.toMin(ev.start)-ev.reminder;
      const key=ev.id+'_'+todayStr;
      if(nowMin>=fireMin && nowMin<=fireMin+1 && !this._notified.has(key)){
        this._notified.add(key);
        try{ new Notification('📅 '+ev.title,{ body:ev.start+' · '+this.catOf(ev.cat).name.split(' ')[0], icon:'icons/icon-192.png' }); }catch(e){}
      }
    });
  }

  toggleCat(id){ this.setState(s=>({ hidden:{ ...s.hidden, [id]:!s.hidden[id] } })); }
  toggleTodo(id){ this.setState(s=>({ todos:s.todos.map(t=>t.id===id?{...t,done:!t.done}:t) })); }
  addTodo(){ this.pushUndo(); const t=this.state.newTodo.trim(); if(!t) return; this.setState(s=>({ todos:[...s.todos,{id:'t'+Date.now(),text:t,done:false,date:''}], newTodo:'' })); }
  delTodo(id){ this.pushUndo(); this.setState(s=>({ todos:s.todos.filter(t=>t.id!==id) })); }

  // ---------- drag to move / resize ----------
  beginDrag(e, ev, dateStr, mode){
    e.stopPropagation(); e.preventDefault();
    const startY=e.clientY;
    this._drag={ id:ev.id, date:dateStr, mode, os:this.toMin(ev.start), oe:this.toMin(ev.end) };
    this._dragDelta=0; this._moved=false;
    const move=( me)=>{
      const dy=me.clientY-startY;
      const dm=Math.round(dy/this.HH*60/15)*15;
      if (Math.abs(dm)>0) this._moved=true;
      this._dragDelta=dm; this.forceUpdate();
    };
    const up=()=>{
      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
      const d=this._drag, dm=this._dragDelta;
      this._drag=null; this._dragDelta=0;
      if (this._moved){
        this._justDragged=true; setTimeout(()=>{this._justDragged=false;},50);
        this.setState(s=>({ events:s.events.map(x=>{
          if (x.id!==d.id) return x;
          if (mode==='move'){ let ns=Math.max(0,Math.min(1440-(d.oe-d.os),d.os+dm)); return {...x,start:this.toHHMM(ns),end:this.toHHMM(ns+(d.oe-d.os))}; }
          else { let ne=Math.max(d.os+15,Math.min(1440,d.oe+dm)); return {...x,end:this.toHHMM(ne)}; }
        }) }));
      } else { this.forceUpdate(); }
    };
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  }

        weeks.map((wk,wi)=>h('div',{ key:wi, style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,minHeight:0} },
          wk.map(ds=>{
            const inM=this.parse(ds).getMonth()===curM;
            const isToday=ds===this.today, sel=ds===S.selected;
            const list=this.instancesOn(ds);
            const hol=this.holidays[ds];
            const max=S.isMobile?2:3;
            return h('div',{ key:ds,
              onClick:()=>{this.pickDate(ds);},
              onDoubleClick:()=>this.openNew(ds,'09:00'),
              onDragOver:(e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; },
              onDrop:(e)=>{ e.preventDefault(); if(!this._dragId) return;
                const ev=this.state.events.find(x=>x.id===this._dragId); this._dragId=null;
                if(!ev||ev.date===ds) return;
                this.pushUndo();
                const diff=this.parse(ds)-this.parse(ev.date);
                const days=Math.round(diff/86400000);
                this.setState(s=>({ events:s.events.map(x=>x.id===ev.id
                  ? {...x, date:ds, ...(x.endDate?{endDate:this.addDays(x.endDate,days)}:{}) }
                  : x) }));
                this.flash('已移至 '+(this.parse(ds).getMonth()+1)+'/'+(this.parse(ds).getDate()));
              },
              style:{background:inM?T.panel:'#f6f2f8',border:'1.5px solid '+(sel?T.primary:T.line),borderRadius:14,padding:S.isMobile?'5px 5px':'7px 8px',
                overflow:'hidden',cursor:'pointer',opacity:inM?1:.6,display:'flex',flexDirection:'column',minHeight:0} },
              h('div',{ style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3} },
                h('span',{ style:{fontSize:13,fontWeight:800,width:23,height:23,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                  background:isToday?T.primary:'transparent',color:isToday?'#fff':(inM?T.ink:'#bbb')} },this.parse(ds).getDate()),
                hol?h('span',{ style:{fontSize:10,fontWeight:800,color:'#e15b7d',background:'#ffe0e8',padding:'1px 6px',borderRadius:6,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'70%'} },hol):null),
              h('div',{ style:{flex:1,overflow:'hidden'} },
                list.slice(0,max).map(inst=>this.eventChip(inst,true)),
                list.length>max?h('div',{ style:{fontSize:10.5,fontWeight:800,color:T.sub,paddingLeft:4} },'+'+(list.length-max)+' 更多'):null));
          }))))
    );
  }

  renderTimeGrid(dates, isDay){
    const T=this.theme, h=React.createElement, S=this.state;
    const HH=this.HH, hours=Array.from({length:24},(_,i)=>i);
    const nowMin=(()=>{ const n=new Date(); return n.getHours()*60+n.getMinutes(); })();
    const gutter=54;
    return h('div',{ ref:(el)=>{ if(el && !this._scrolled){ el.scrollTop=6.5*HH; this._scrolled=true; } },
      style:{flex:1,overflow:'auto',minHeight:0,background:T.panel} },
      // all-day / date header
      h('div',{ style:{position:'sticky',top:0,zIndex:5,display:'grid',gridTemplateColumns:gutter+'px repeat('+dates.length+',1fr)',background:T.panel,borderBottom:'1px solid '+T.line} },
        h('div',{ style:{borderRight:'1px solid '+T.line} }),
        dates.map(ds=>{
          const isToday=ds===this.today; const dd=this.parse(ds); const hol=this.holidays[ds];
          return h('div',{ key:ds, style:{padding:'8px 4px',textAlign:'center',borderRight:'1px solid '+T.line} },
            h('div',{ style:{fontSize:12,fontWeight:700,color:isToday?T.primary:T.sub} },'星期'+this.weekdayNames[dd.getDay()]),
            h('div',{ style:{display:'inline-flex',marginTop:3,minWidth:30,height:30,padding:'0 6px',borderRadius:15,alignItems:'center',justifyContent:'center',
              fontSize:16,fontWeight:800,background:isToday?T.primary:'transparent',color:isToday?'#fff':T.ink} },dd.getDate()),
            hol?h('div',{ style:{fontSize:10,fontWeight:800,color:'#e15b7d',marginTop:2} },hol):null);
        })),
      // grid body
      h('div',{ style:{position:'relative',display:'grid',gridTemplateColumns:gutter+'px repeat('+dates.length+',1fr)'} },
        // hour labels
        h('div',{ style:{position:'relative'} },
          hours.map(hr=>h('div',{ key:hr, style:{height:HH,position:'relative'} },
            hr>0?h('span',{ style:{position:'absolute',top:-8,right:8,fontSize:11,fontWeight:700,color:T.sub} },this.pad(hr)+':00'):null))),
        // day columns
        dates.map(ds=>{
          const list=this.instancesOn(ds);
          const isToday=ds===this.today;
          return h('div',{ key:ds, onClick:(e)=>{ if(this._justDragged) return; const y=e.nativeEvent.offsetY; let m=Math.round((y/HH*60)/30)*30; m=Math.max(0,Math.min(1410,m)); this.openNew(ds,this.toHHMM(m)); },
            style:{position:'relative',borderRight:'1px solid '+T.line,borderLeft:isToday?'0':'0'} },
            // hour lines
            hours.map(hr=>h('div',{ key:hr, style:{height:HH,borderTop:'1px solid '+(hr%1===0?T.line:'transparent')} })),
            // now line
            isToday?h('div',{ style:{position:'absolute',left:0,right:0,top:(nowMin/60*HH),height:2,background:'#ff4d6d',zIndex:4,pointerEvents:'none'} },
              h('span',{ style:{position:'absolute',left:-4,top:-4,width:9,height:9,borderRadius:'50%',background:'#ff4d6d'} })):null,
            // events
            list.map(inst=>{
              const c=this.catOf(inst.cat);
              let sm=this.toMin(inst.start), em=this.toMin(inst.end), dur=em-sm;
              const dragging=this._drag && this._drag.id===inst.id && this._drag.date===ds;
              if (dragging){ if(this._drag.mode==='move'){ sm+=this._dragDelta; } else { dur+=this._dragDelta; } }
              const top=sm/60*HH, height=Math.max(22,dur/60*HH);
              return h('div',{ key:inst.id, onPointerDown:(e)=>this.beginDrag(e,inst,ds,'move'),
                onClick:(e)=>{ e.stopPropagation(); if(this._moved){this._moved=false;return;} this.openEdit(this.state.events.find(x=>x.id===inst.id)); },
                style:{position:'absolute',top,height,left:4,right:4,background:c.soft,borderLeft:'3px solid '+c.dot,borderRadius:9,
                  padding:'4px 8px',overflow:'hidden',cursor:'grab',zIndex:dragging?10:2,boxShadow:dragging?'0 8px 20px rgba(0,0,0,.18)':'0 1px 3px rgba(0,0,0,.05)',userSelect:'none',touchAction:'none'} },
                h('div',{ style:{fontSize:12,fontWeight:800,color:c.ink,lineHeight:1.15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'} },inst.title),
                height>34?h('div',{ style:{fontSize:11,fontWeight:600,color:c.ink,opacity:.8,marginTop:1} },inst.start+'–'+inst.end,inst.reminder>0?'  🔔':''):null,
                inst.repeat!=='none'?h('span',{ style:{position:'absolute',top:4,right:6,fontSize:10,color:c.ink,opacity:.6} },'↻'):null,
                h('div',{ onPointerDown:(e)=>this.beginDrag(e,inst,ds,'resize'),
                  style:{position:'absolute',bottom:0,left:0,right:0,height:8,cursor:'ns-resize'} }));
            }));
        })));
  }

  renderAgenda(){
    const T=this.theme, h=React.createElement, S=this.state;
    // gather next 21 days from selected
    const groups=[];
    for (let i=0;i<28;i++){
      const ds=this.addDays(S.selected,i);
      const list=this.instancesOn(ds);
      if (list.length) groups.push({ ds, list });
    }
    return h('div',{ style:{flex:1,overflow:'auto',minHeight:0,padding:S.isMobile?'14px 14px 90px':'22px 26px'} },
      h('div',{ style:{maxWidth:720,margin:'0 auto'} },
        groups.length===0?h('div',{ style:{textAlign:'center',color:T.sub,padding:'80px 20px',fontSize:15,fontWeight:600} },
          S.query?('找不到符合「'+S.query+'」的事件'):'接下來 28 天沒有安排 🌤️'):null,
        groups.map(g=>{
          const dd=this.parse(g.ds); const isToday=g.ds===this.today; const hol=this.holidays[g.ds];
          return h('div',{ key:g.ds, style:{display:'flex',gap:S.isMobile?12:20,marginBottom:22,animation:'fadeIn .3s ease'} },
            h('div',{ style:{width:S.isMobile?50:64,flexShrink:0,textAlign:'center'} },
              h('div',{ style:{fontSize:12,fontWeight:800,color:isToday?T.primary:T.sub} },'星期'+this.weekdayNames[dd.getDay()]),
              h('div',{ style:{fontSize:S.isMobile?26:32,fontWeight:800,color:isToday?T.primary:T.ink,lineHeight:1.1,fontFamily:"'Fredoka',sans-serif"} },dd.getDate()),
              h('div',{ style:{fontSize:11,color:T.sub,fontWeight:700} },(dd.getMonth()+1)+'月'),
              hol?h('div',{ style:{fontSize:10,fontWeight:800,color:'#e15b7d',marginTop:3} },hol):null),
            h('div',{ style:{flex:1,display:'flex',flexDirection:'column',gap:8,paddingTop:2} },
              g.list.map(inst=>{
                const c=this.catOf(inst.cat);
                return h('button',{ key:inst.id, onClick:()=>this.openEdit(this.state.events.find(x=>x.id===inst.id)),
                  style:{display:'flex',alignItems:'center',gap:14,textAlign:'left',border:'1px solid '+T.line,background:T.panel,borderRadius:14,padding:'13px 16px',cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.03)'} },
                  h('div',{ style:{width:5,alignSelf:'stretch',minHeight:34,borderRadius:4,background:c.dot,flexShrink:0} }),
                  h('div',{ style:{flex:1,minWidth:0} },
                    h('div',{ style:{fontSize:15,fontWeight:800,color:T.ink,marginBottom:2} },inst.title),
                    h('div',{ style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'} },
                      h('span',{ style:{fontSize:12.5,fontWeight:700,color:T.sub} },inst.start+' – '+inst.end),
                      h('span',{ style:{fontSize:11,fontWeight:800,color:c.ink,background:c.soft,padding:'2px 9px',borderRadius:20} },c.name),
                      inst.reminder>0?h('span',{ style:{fontSize:11,color:T.sub} },'🔔 '+inst.reminder+' 分前'):null,
                      inst.repeat!=='none'?h('span',{ style:{fontSize:11,color:T.sub} },'↻ 重複'):null)),
                  inst.note?h('span',{ style:{fontSize:12,color:T.sub,maxWidth:130,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'} },inst.note):null);
              })));
        })));
  }

  // ---------- modal ----------
  renderModal(){
    const T=this.theme, h=React.createElement, m=this.state.modal, S=this.state;
    const field=(label,node)=>h('div',{ style:{marginBottom:14} },
      h('label',{ style:{display:'block',fontSize:12.5,fontWeight:800,color:T.sub,marginBottom:6} },label),node);
    const inp={ width:'100%',border:'1.5px solid '+T.line,borderRadius:11,padding:'11px 13px',fontSize:14.5,color:T.ink,outline:'none',background:T.bg };
    return h('div',{ onClick:()=>this.closeModal(), style:{position:'fixed',inset:0,zIndex:70,background:'rgba(60,50,70,.4)',display:'flex',alignItems:S.isMobile?'flex-end':'center',justifyContent:'center',padding:S.isMobile?0:20,animation:'fadeIn .18s ease'} },
      h('div',{ onClick:e=>e.stopPropagation(),
        style:{background:T.panel,borderRadius:S.isMobile?'22px 22px 0 0':22,width:S.isMobile?'100%':440,maxWidth:'100%',maxHeight:'92vh',overflow:'auto',
          padding:'24px 24px 22px',boxShadow:'0 24px 60px rgba(0,0,0,.28)',animation:(S.isMobile?'slideUp':'popIn')+' .25s ease'} },
        h('div',{ style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18} },
          h('h2',{ style:{fontFamily:"'Fredoka',sans-serif",fontWeight:600,fontSize:21,color:T.ink,margin:0} }, m.id?'編輯事件':'新增事件'),
          h('button',{ onClick:()=>this.closeModal(), style:{border:'none',background:T.bg,width:34,height:34,borderRadius:10,fontSize:18,cursor:'pointer',color:T.sub} },'×')),
        field('標題 Title', h('input',{ autoFocus:true, value:m.title, placeholder:'例如：和 Amy 喝咖啡', onChange:e=>this.updModal('title',e.target.value), style:inp })),
        field('日期 Date', h('input',{ type:'date', value:m.date, onChange:e=>this.updModal('date',e.target.value), style:inp })),
        h('div',{ style:{display:'flex',gap:12} },
          h('div',{ style:{flex:1} },field('開始', h('input',{ type:'time', value:m.start, onChange:e=>{ const dur=Math.max(15,this.toMin(m.end)-this.toMin(m.start)); const ns=e.target.value; this.setState(s=>({modal:{...s.modal,start:ns,end:this.toHHMM(Math.min(1439,this.toMin(ns)+dur))}})); }, style:inp }))),
          h('div',{ style:{flex:1} },field('結束', h('input',{ type:'time', value:m.end, onChange:e=>this.updModal('end',e.target.value), style:inp })))),
        field('分類 Category', h('div',{ style:{display:'flex',gap:8,flexWrap:'wrap'} },
          this.state.categories.map(c=>{
            const on=m.cat===c.id;
            return h('button',{ key:c.id, onClick:()=>this.updModal('cat',c.id),
              style:{display:'flex',alignItems:'center',gap:7,padding:'8px 13px',borderRadius:11,cursor:'pointer',
                border:'2px solid '+(on?c.dot:'transparent'),background:on?c.soft:T.bg,color:on?c.ink:T.sub,fontWeight:800,fontSize:13} },
              h('span',{ style:{width:11,height:11,borderRadius:4,background:c.dot} }),c.name.split(' ')[0]);
          }))),
        h('div',{ style:{display:'flex',gap:12} },
          h('div',{ style:{flex:1} },field('重複 Repeat', h('select',{ value:m.repeat, onChange:e=>this.updModal('repeat',e.target.value), style:{...inp,cursor:'pointer'} },
            h('option',{value:'none'},'不重複'),h('option',{value:'daily'},'每天'),h('option',{value:'weekdays'},'每個工作日'),h('option',{value:'weekly'},'每週'),h('option',{value:'monthly'},'每月')))),
          h('div',{ style:{flex:1} },field('提醒 Reminder', h('select',{ value:m.reminder, onChange:e=>this.updModal('reminder',Number(e.target.value)), style:{...inp,cursor:'pointer'} },
            h('option',{value:0},'不提醒'),h('option',{value:5},'5 分鐘前'),h('option',{value:10},'10 分鐘前'),h('option',{value:15},'15 分鐘前'),h('option',{value:30},'30 分鐘前'),h('option',{value:60},'1 小時前'))))),
        field('備註 Note', h('textarea',{ value:m.note, placeholder:'補充說明…', onChange:e=>this.updModal('note',e.target.value), rows:2, style:{...inp,resize:'vertical',fontFamily:'inherit'} })),
        h('div',{ style:{display:'flex',gap:10,marginTop:8} },
          m.id?h('button',{ onClick:()=>this.deleteModal(), style:{padding:'12px 16px',borderRadius:12,border:'none',background:'#ffe0e6',color:'#d64066',fontWeight:800,fontSize:14.5,cursor:'pointer'} },'刪除'):null,
          m.id?h('button',{ title:'複製此事項，再點選目標日期按 Ctrl+V 貼上',
            onClick:()=>{ this._clipEvent={...this.state.modal}; this.flash('已複製：'+this._clipEvent.title+' → 點選目標日期後按 Ctrl+V'); },
            style:{padding:'12px 16px',borderRadius:12,border:'1px solid '+T.line,background:T.panel,color:T.sub,fontWeight:800,fontSize:14.5,cursor:'pointer'} },'複製'):null,
          h('div',{ style:{flex:1} }),
          h('button',{ onClick:()=>this.closeModal(), style:{padding:'12px 20px',borderRadius:12,border:'1px solid '+T.line,background:T.panel,color:T.ink,fontWeight:800,fontSize:14.5,cursor:'pointer'} },'取消'),
          h('button',{ onClick:()=>this.saveModal(), style:{padding:'12px 24px',borderRadius:12,border:'none',background:T.primary,color:'#fff',fontWeight:800,fontSize:14.5,cursor:'pointer',boxShadow:'0 4px 12px '+this.hex(T.primary,.4)} },'儲存')),
      ));
  }
}
</script>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW register failed', e); });

  }
</script>
